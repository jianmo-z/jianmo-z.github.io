        <h1 id="18-批量修改文件后缀并格式化存储"><a href="#18-批量修改文件后缀并格式化存储" class="headerlink" title="18 批量修改文件后缀并格式化存储"></a>18 批量修改文件后缀并格式化存储</h1><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br></pre></td><td class="code"><pre><span class="line">package main</span><br><span class="line"></span><br><span class="line">import (</span><br><span class="line">	&quot;fmt&quot;</span><br><span class="line">	&quot;io&quot;</span><br><span class="line">	&quot;os&quot;</span><br><span class="line">	&quot;path/filepath&quot;</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line">func main() &#123;</span><br><span class="line">	dir := &quot;C:/Users/Pip/Desktop/Go初识/&quot;</span><br><span class="line"></span><br><span class="line">	// 改变路径</span><br><span class="line">	err := os.Chdir(dir)</span><br><span class="line">	if err != nil &#123;</span><br><span class="line">		fmt.Println(&quot;打开文件失败&quot;)</span><br><span class="line">		os.Exit(1)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	// 获取文件列表</span><br><span class="line">	fileList, err := filepath.Glob(&quot;*&quot;)</span><br><span class="line">	if err != nil &#123;</span><br><span class="line">		fmt.Println(&quot;获取失败&quot;)</span><br><span class="line">		os.Exit(1)</span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println(fileList)</span><br><span class="line"></span><br><span class="line">	// 遍历文件列表修改后缀并新建文件</span><br><span class="line">	for _, name := range fileList &#123;</span><br><span class="line">		// 跳过.md文件</span><br><span class="line">		if string(name[len(name) - 3:]) == &quot;.md&quot;&#123;</span><br><span class="line">			continue</span><br><span class="line">		&#125;</span><br><span class="line">		newName := name[:len(name) - 3] + &quot;.md&quot;</span><br><span class="line"></span><br><span class="line">		// 打开.go文件</span><br><span class="line">		oldfile, err := os.OpenFile(name, os.O_RDWR, 0666)</span><br><span class="line">		if err != nil &#123;</span><br><span class="line">			fmt.Printf(&quot;打开文件%s失败\n&quot;, newName)</span><br><span class="line">			os.Exit(1)</span><br><span class="line">		&#125;</span><br><span class="line">		fmt.Println(&quot;Open file:&quot;, name, &quot;success&quot;)</span><br><span class="line"></span><br><span class="line">		// 打开.md文件不存在则新建</span><br><span class="line">		newfile, err := os.OpenFile(newName, os.O_CREATE | os.O_RDWR, 0666)</span><br><span class="line">		if err != nil &#123;</span><br><span class="line">			fmt.Printf(&quot;Open file: %s failed\n&quot;, newName)</span><br><span class="line">			os.Exit(1)</span><br><span class="line">		&#125;</span><br><span class="line">		fmt.Println(&quot;Open file:&quot;, newName, &quot;success&quot;)</span><br><span class="line"></span><br><span class="line">		// 修改格式写入另一个文件</span><br><span class="line">		_, err = newfile.WriteString(&quot;# &quot; + name[:len(name)-3] + &quot;\n```\n&quot;)</span><br><span class="line">		if err != nil&#123;</span><br><span class="line">			fmt.Println(&quot;Write &quot;, newName, &quot;failed&quot;)</span><br><span class="line">			os.Exit(1)</span><br><span class="line">		&#125;</span><br><span class="line">		var fileContent = make([] byte, 1024)</span><br><span class="line">		for ;;&#123;</span><br><span class="line">			n, err := oldfile.Read(fileContent)</span><br><span class="line">			if err != nil &amp;&amp; err != io.EOF&#123;</span><br><span class="line">				fmt.Println(&quot;Write to&quot;, newName, &quot;failed&quot;)</span><br><span class="line">				os.Exit(1)</span><br><span class="line">			&#125;else if n == 0 &#123;</span><br><span class="line">				break</span><br><span class="line">			&#125;</span><br><span class="line">			newfile.WriteString(string(fileContent)[:n])</span><br><span class="line">		&#125;</span><br><span class="line">		_, err = newfile.WriteString(&quot;\n```&quot;)</span><br><span class="line">		if err != nil &#123;</span><br><span class="line">			fmt.Println(&quot;Write to&quot;, newName, &quot;failed&quot;)</span><br><span class="line">			os.Exit(1)</span><br><span class="line">		&#125;</span><br><span class="line">		fmt.Println(&quot;Write to&quot;, string(newName), &quot;success\n&quot;)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">		//newfile.Sync() // 立即同步,即将内容写入数据</span><br><span class="line">		newfile.Close() // 关闭文件或者程序终止内容才会写入文件</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
