/span><br><span class="line"></span><br><span class="line">void handle(int sign)</span><br><span class="line">&#123;</span><br><span class="line">	printf(&quot;sign = %d\n&quot;, sign);</span><br><span class="line">	exit(EXIT_SUCCESS);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">//size_t read(int fd, void *buf, size_t count);</span><br><span class="line">//ssize_t 无符号整数</span><br><span class="line">//size_t 有符号整数</span><br><span class="line">ssize_t readn(int fd, void * buf, size_t count)</span><br><span class="line">&#123;</span><br><span class="line">	size_t nleft = count;</span><br><span class="line">	ssize_t nread = 0;</span><br><span class="line">	char * bufp = static_cast&lt;char *&gt;(buf);</span><br><span class="line">	while(nleft &gt; 0)</span><br><span class="line">	&#123;</span><br><span class="line">		if((nread = read(fd, bufp, nleft)) &lt; 0)</span><br><span class="line">		&#123;</span><br><span class="line">			if(errno == EINTR)//如果信号被中断，仍然要继续发送数据。</span><br><span class="line">				continue;</span><br><span class="line">			//return 0;</span><br><span class="line">			return -1;</span><br><span class="line">		&#125;</span><br><span class="line">		else if(nread == 0)</span><br><span class="line">			return count - nleft;</span><br><span class="line">		bufp += nread;</span><br><span class="line">		nleft -= nread;</span><br><span class="line">	&#125;</span><br><span class="line">	return count;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">//ssize_t write(int fd, const void *buf, size_t count);</span><br><span class="line">//ssize_t 无符号整数</span><br><span class="line">//size_t 有符号整数</span><br><span class="line">ssize_t writen(int fd, void * buf, size_t count)</span><br><span class="line">&#123;</span><br><span class="line"></span><br><span class="line">	size_t nleft = count;</span><br><span class="line">	ssize_t nwrite;</span><br><span class="line">	char * bufp = static_cast&lt;char *&gt;(buf);</span><br><span class="line">	while(nleft &gt; 0)</span><br><span class="line">	&#123;</span><br><span class="line">		if((nwrite = write(fd, bufp, nleft)) &lt; 0)</span><br><span class="line">		&#123;</span><br><span class="line">			if(errno == EINTR)//如果信号被中断，仍然要继续发送数据。</span><br><span class="line">				continue;</span><br><span class="line">			return -1;</span><br><span class="line">		&#125;</span><br><span class="line">		else if(nwrite == 0)</span><br><span class="line">			continue;</span><br><span class="line">		bufp += nwrite;</span><br><span class="line">		nleft -= nwrite;</span><br><span class="line">	&#125;</span><br><span class="line">	return count;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">ssize_t recv_peek(int sockfd, void * buf, size_t len)</span><br><span class="line">&#123;</span><br><span class="line">	while(1)</span><br><span class="line">	&#123;	//recv读取数据但是不会把数据从缓冲区移除</span><br><span class="line">		int ret = recv(sockfd, buf, len, MSG_PEEK);//有数据返回，无数据阻塞，对方套接口关闭，返回零，信号中断返回-1</span><br><span class="line">		if(ret == -1 &amp;&amp; errno == EINTR)//信号终止，继续进行操作</span><br><span class="line">		&#123;</span><br><span class="line">			continue;</span><br><span class="line">		&#125;</span><br><span class="line">		return ret;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line">ssize_t readline(int sockfd, void * buf, size_t maxline)</span><br><span class="line">&#123;</span><br><span class="line">	int ret;</span><br><span class="line">	int nread;</span><br><span class="line">	char * bufp = static_cast&lt;char *&gt;(buf);</span><br><span class="line">	int nleft = maxline;</span><br><span class="line">	while(1)</span><br><span class="line">	&#123;</span><br><span class="line">		ret = recv_peek(sockfd, buf, nleft);</span><br><span class="line">		if(ret &lt; 0)</span><br><span class="line">			return ret;</span><br><span class="line">		else if(ret == 0)//表示对方关闭了套接口</span><br><span class="line">			return ret;</span><br><span class="line">		nread = ret;//接收到的字节数</span><br><span class="line">		int i;</span><br><span class="line">		for(i = 0; i &lt; nread; i++)</span><br><span class="line">		&#123;</span><br><span class="line">			if(bufp[i] == &#x27;\n&#x27;)</span><br><span class="line">			&#123;</span><br><span class="line">				ret = readn(sockfd, bufp, i+1);//取出数据并从缓冲区移除</span><br><span class="line">				if(ret != i + 1)//接收数据失败，直接返回</span><br><span class="line">				&#123;</span><br><span class="line">					printf(&quot;接收数据失败&quot;);</span><br><span class="line">					exit(EXIT_FAILURE);</span><br><span class="line">				&#125;</span><br><span class="line">				return ret;</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">		if(nread &gt; nleft)//没有遇到&#x27;\n&#x27;把数据拿出来</span><br><span class="line">		&#123;</span><br><span class="line">			printf(&quot;没有遇到回车换&quot;);</span><br><span class="line">			exit(EXIT_FAILURE);</span><br><span class="line">		&#125;</span><br><span class="line">		nleft -= nread;</span><br><span class="line">		ret = readn(sockfd, bufp, nread);</span><br><span class="line">		if(ret != nread)//接收数据失败，直接返回</span><br><span class="line">		&#123;</span><br><span class="line">			printf(&quot;接收数据失败&quot;);</span><br><span class="line">			exit(EXIT_FAILURE);</span><br><span class="line">		&#125;</span><br><span class="line">		bufp += nread;//指针偏移，如果遇到&#x27;\n&#x27;指针已经偏移</span><br><span class="line">	&#125;</span><br><span class="line">	return -1;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void activate_nonblock(int fd)</span><br><span class="line">&#123;</span><br><span class="line">	int ret = 0;</span><br><span class="line">	int flags = fcntl(fd, F_GETFL);//获取文件描述符的状态</span><br><span class="line">	if(fd == -1)</span><br><span class="line">	&#123;</span><br><span class="line">		ERR_EXIT(&quot;fcntl:1&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">	flags |= O_NONBLOCK;//不阻塞模式</span><br><span class="line">	ret = fcntl(fd, F_SETFL, flags);//设置文件描述符的状态</span><br><span class="line">	if(ret == -1)</span><br><span class="line">	&#123;</span><br><span class="line">		ERR_EXIT(&quot;fcntl:2&quot;);	</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line">void deactivate_nonblock(int fd)</span><br><span class="line">&#123;</span><br><span class="line">	int ret = 0;</span><br><span class="line">	int flags = fcntl(fd, F_GETFL);</span><br><span class="line">	if(flags == -1)</span><br><span class="line">	&#123;</span><br><span class="line">		ERR_EXIT(&quot;fcntl:1&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">	flags &amp;= ~O_NONBLOCK;//不阻塞，位操作,~按位取反</span><br><span class="line">	ret = fcntl(fd, F_SETFL, flags);</span><br><span class="line">	if(ret == -1)</span><br><span class="line">	&#123;</span><br><span class="line">		ERR_EXIT(&quot;fcntl:1&quot;);</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void signal_handle(int sign)</span><br><span class="line">&#123;</span><br><span class="line">	//wait(NULL);</span><br><span class="line">	//waitpid(-1, NULL, WNOHANG);//可能会有僵尸进程的存在，因为进程发送了SIGCHLD信号但是没有接收到，无法处理导致了僵尸进程的存在</span><br><span class="line">	while(waitpid(-1, NULL, WNOHANG) &gt; 0);//如果没有子进程退出循环,避免僵尸进程</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void signpipe(int sign)</span><br><span class="line">&#123;</span><br><span class="line">	printf(&quot;SIGPIPE = %d\n&quot;, sign);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int main()</span><br><span class="line">&#123;</span><br><span class="line">	//int conn = -1;</span><br><span class="line">	int listenfd;</span><br><span class="line">	struct sockaddr_in servaddr;//一个服务器的地址</span><br><span class="line">	signal(SIGPIPE, signpipe);//信号	</span><br><span class="line">	//signal(SIGCHLD, SIG_IGN);//忽略信号	</span><br><span class="line">	signal(SIGCHLD, signal_handle);//忽略信号	</span><br><span class="line">	listenfd = socket(PF_INET, SOCK_STREAM, IPPROTO_TCP);</span><br><span class="line">	if(listenfd &lt; 0)</span><br><span class="line">	&#123;</span><br><span class="line">		perror(&quot;创建scoket失败\n&quot;);</span><br><span class="line">		exit(EXIT_FAILURE);//退出程序</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	memset(&amp;servaddr, 0, sizeof(servaddr));//初始化地址</span><br><span class="line">	servaddr.sin_family = AF_INET;//地址族</span><br><span class="line">	servaddr.sin_port = htons(6000);//端口号，网络字节序转化为主机字节序</span><br><span class="line"></span><br><span class="line">	servaddr.sin_addr.s_addr = htonl(INADDR_ANY);//表示绑定本机的任意地址(返回一个主机字节序)---&gt;和下面的两个一样作用绑定IP地址</span><br><span class="line">	//servaddr.sin_addr.s_addr = inet_addr(&quot;127.0.0.1&quot;);//(和上面的一样的意思)指定网络地址---&gt; 真实的情况下表示本机的ip地址</span><br><span class="line">	//inet_aton(&quot;127.0.0.1&quot;, &amp;servaddr.sin_addr);//绑定IP地址</span><br><span class="line"></span><br><span class="line">	int on = 1;</span><br><span class="line">	on = setsockopt(listenfd, SOL_SOCKET, SO_REUSEADDR, &amp;on, sizeof(on));</span><br><span class="line">	if(on &lt; 0)</span><br><span class="line">	&#123;</span><br><span class="line">		printf(&quot;端口重复利用失败\n&quot;);</span><br><span class="line">		exit(EXIT_FAILURE);</span><br><span class="line">	&#125;	</span><br><span class="line"></span><br><span class="line">	if(bind(listenfd, (struct sockaddr *)&amp;servaddr, sizeof(servaddr)) &lt; 0)</span><br><span class="line">	&#123;</span><br><span class="line">		perror(&quot;绑定本地地址到套接字失败\n&quot;);</span><br><span class="line">		exit(EXIT_FAILURE);</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	if(listen(listenfd, SOMAXCONN) &lt; 0)</span><br><span class="line">	&#123;</span><br><span class="line">		perror(&quot;绑定本地地址到套接字失败\n&quot;);</span><br><span class="line">		exit(EXIT_FAILURE);</span><br><span class="line">	&#125;	</span><br><span class="line"></span><br><span class="line">	struct sockaddr_in peeraddr;</span><br><span class="line">	socklen_t peerlen = sizeof(peeraddr);//必须有初始值，否则accept会失败</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">	std::vector&lt;int&gt; clients;</span><br><span class="line">	int epollfd;</span><br><span class="line">	epollfd = epoll_create1(EPOLL_CLOEXEC);//创建一个实例</span><br><span class="line">	</span><br><span class="line">	struct epoll_event event;</span><br><span class="line">	event.data.fd = listenfd;</span><br><span class="line">	event.events = EPOLLIN | EPOLLET;//EPOLLIN监听，EPOLLET边沿方式触发</span><br><span class="line">	</span><br><span class="line">	epoll_ctl(epollfd, EPOLL_CTL_ADD, listenfd, &amp;event);//添加一个套接字到epoll</span><br><span class="line">	</span><br><span class="line">	EventList events(16);</span><br><span class="line">	struct sockaddr_in perraddr;</span><br><span class="line">	socklen_t perrlen;</span><br><span class="line">	int conn;</span><br><span class="line">	int count = 0;</span><br><span class="line">	int i;</span><br><span class="line">	int nready;</span><br><span class="line"></span><br><span class="line">	while(1)</span><br><span class="line">	&#123;</span><br><span class="line">		//检测那个套接字产生的事件。 //&amp;*：迭代器解绑定的感觉... ...</span><br><span class="line">		nready = epoll_wait(epollfd, &amp;(*events.begin()), static_cast&lt;int&gt;(events.size()), -1);</span><br><span class="line">		if(nready == -1)</span><br><span class="line">		&#123;</span><br><span class="line">			if(errno == EINTR)</span><br><span class="line">				continue;</span><br><span class="line">			ERR_EXIT(&quot;epoll_wait&quot;);</span><br><span class="line">		&#125;</span><br><span class="line">		if(nready == 0)</span><br><span class="line">			continue;</span><br><span class="line">		if((ssize_t)nready == events.size())</span><br><span class="line">			if(events.size() &gt; 4096)</span><br><span class="line">				events.resize(events.size() + 2048);</span><br><span class="line">			else</span><br><span class="line">				events.resize(events.size() * 2);</span><br><span class="line">		for(i = 0; i &lt; nready; i++)</span><br><span class="line">		&#123;</span><br><span class="line">			if(events[i].data.fd == listenfd)</span><br><span class="line">			&#123;</span><br><span class="line">				perrlen = sizeof(perraddr);</span><br><span class="line">				conn = accept(listenfd, (struct sockaddr *)&amp;peeraddr, &amp;perrlen);</span><br><span class="line">				if(conn == -1)</span><br><span class="line">					ERR_EXIT(&quot;accept&quot;);</span><br><span class="line">				printf(&quot;peer:ip = %s, port = %d\n&quot;, inet_ntoa(perraddr.sin_addr), ntohs(perraddr.sin_port));</span><br><span class="line">				printf(&quot;count = %d\n&quot;, ++count);</span><br><span class="line">				clients.push_back(conn);</span><br><span class="line">				activate_nonblock(conn);//设置为非阻塞模式</span><br><span class="line">				</span><br><span class="line">				//添加新的套接字到event中</span><br><span class="line">				event.data.fd = conn;</span><br><span class="line">				event.events = EPOLLIN | EPOLLET;</span><br><span class="line">				epoll_ctl(epollfd, EPOLL_CTL_ADD, conn, &amp;event);</span><br><span class="line">			&#125;</span><br><span class="line">			else if(events[i].events &amp; EPOLLIN)</span><br><span class="line">			&#123;</span><br><span class="line">				conn = events[i].data.fd;</span><br><span class="line">				if(conn &lt; 0)</span><br><span class="line">					continue;</span><br><span class="line">				char recvbuf[1024] = &#123;0&#125;;</span><br><span class="line">				int ret = readline(conn, recvbuf, 1024);</span><br><span class="line"></span><br><span class="line">				if(ret == -1)</span><br><span class="line">					ERR_EXIT(&quot;readline&quot;)</span><br><span class="line">				else if(ret == 0)</span><br><span class="line">				&#123;</span><br><span class="line">					count --;</span><br><span class="line">					printf(&quot;client closed\n&quot;);</span><br><span class="line">					close(conn);</span><br><span class="line">					event = events[i];</span><br><span class="line">					epoll_ctl(epollfd, EPOLL_CTL_DEL, conn, &amp;event);</span><br><span class="line">					clients.erase(std::remove(clients.begin(), clients.end(), conn), clients.end());//删除已经断开的客户端的套接字</span><br><span class="line">				&#125;</span><br><span class="line">				fputs(recvbuf, stdout);</span><br><span class="line">				writen(conn, recvbuf, strlen(recvbuf));</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
